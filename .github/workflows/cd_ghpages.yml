name: Deploy on GitHub Pages

on:
  push:
    branches:
      - main
      - reference_documentation

permissions:
  contents: write

jobs:
  deploy-on-ghpages:
    #concurrency: ci-${{ github.ref }}  # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Install EMMOntoPy and tripper
      run: |
        pip install --upgrade pip
        pip install \
            "EMMOntoPy[ontodoc,ontokit] @ git+https://github.com/emmo-repo/EMMOntoPy.git@ontokit_dev" \
            "tripper[datadoc] @ git+https://github.com/EMMC-ASBL/tripper.git@master"

    - name: Load ontokit configuration
      run: |
        if [ ! -f .ontokit_conf.yml ]; then
          echo "Missing .ontokit_conf.yml" >&2
          exit 1
        fi

        for key in ONTOLOGY_NAME ONTOLOGY_PREFIX ONTOLOGY_IRI GITHUB_REPOSITORY BUILD_DIR; do
          value=$(sed -n -E "s/^${key}:[[:space:]]*(.*)$/\\1/p" .ontokit_conf.yml | head -n 1)
          if [ -z "$value" ]; then
            echo "Missing required key '${key}' in .ontokit_conf.yml" >&2
            exit 1
          fi
          echo "${key}=${value}" >> "$GITHUB_ENV"
        done


    - name: List installed Python modules
      run: |
        pip list

    - name: Install ROBOT
      run: |
        mkdir bin
        wget -nv https://github.com/ontodev/robot/releases/download/v1.9.6/robot.jar
        mv robot.jar bin/.
        curl https://raw.githubusercontent.com/ontodev/robot/master/bin/robot > bin/robot
        chmod +x bin/robot
        ls -l bin/

    - name: Download Widoco
      run: |
        wget --quiet https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar

    - name: Copy documentation to gh-pages
      run: |
        mkdir -p build
        cp -r docs/ build/.

    - name: Create squashed ontologies
      run: |
        cp README.md build/.
        ontoconvert \
            -saw \
            --base-iri="${ONTOLOGY_IRI}/" \
            --iri="${ONTOLOGY_IRI}" \
            --namespace="ssbd:${ONTOLOGY_IRI}/" \
            --namespace="ddoc:https://w3id.org/emmo/application/datadoc#" \
            --namespace="widoco:https://w3id.org/widoco/vocab#" \
            --namespace="dcatap:http://data.europa.eu/r5r/" \
            ${ONTOLOGY_NAME}.ttl \
            build/${ONTOLOGY_NAME}.ttl

    - name: Create inferred ontologies
      run: |
        bin/robot reason \
          --reasoner HermiT \
          --remove-redundant-subclass-axioms true \
          --preserve-annotated-axioms true \
          --exclude-owl-thing true \
          --exclude-duplicate-axioms true \
          --input build/${ONTOLOGY_NAME}.ttl \
          --output build/${ONTOLOGY_NAME}-inferred.ttl
        ontoconvert --iri=${ONTOLOGY_IRI}/inferred build/${ONTOLOGY_NAME}-inferred.ttl public/${ONTOLOGY_NAME}-inferred.ttl

    - name: Generate Widoco documentation for SSbD Core Ontology
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile core.ttl \
            -outFolder build/widoco \
            -getOntologyMetadata \
            -oops \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for reused terms
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile reused-terms.ttl \
            -outFolder build/widoco-reused-terms \
            -excludeIntroduction \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Include Markdown documentation on gh-pages
      run: |
        cp -r docs build/.

    - name: Generate Widoco documentation for ddoc terms
      run: |
        ontoconvert -awe \
            ddoc.ttl \
            build/ddoc-doc.ttl

        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile build/ddoc-doc.ttl \
            -outFolder build/widoco-ddoc \
            -excludeIntroduction \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for matter taxonomy
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile matter.ttl \
            -outFolder build/widoco-matter \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for models
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile models.ttl \
            -outFolder build/widoco-models \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for CHEMINF
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile cheminf.ttl \
            -outFolder build/widoco-cheminf \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Include Markdown documentation on gh-pages
      run: |
        cp -r docs build/.

    - name: Generate JSON-LD context
      run: |
        mkdir -p build/context
        keywords \
            --input=build/${ONTOLOGY_NAME}.ttl \
            --write-context=build/context/${ONTOLOGY_NAME}.jsonld \
            --redefine=allow \
            --set-prefix=emmo:https://w3id.org/emmo/hume# \
            --set-prefix=cheminf:http://semanticscience.org/resource/ \
            --set-prefix=ssbd:https://w3id.org/ssbd/
            #--namespace-filter=ssbd

    - name: Generate keywords file
      run: |
        mkdir -p build/context
        keywords \
            --input=build/${ONTOLOGY_NAME}.ttl \
            --write-kw-yaml=build/context/keywords.yaml \
            --redefine=allow \
            --set-prefix=emmo:https://w3id.org/emmo/hume# \
            --set-prefix=cheminf:http://semanticscience.org/resource/ \
            --set-prefix=ssbd:https://w3id.org/ssbd/
            #--namespace-filter=ssbd

    - name: Generate Ontokit documentation to public
      run: ontokit docs --imported --recursive --ontology-file=core.ttl --docs-dir=docs . && touch public/.nojekyll

    # Copy turtle files from build to public
    - name: Copy ontologies to public
      run: cp build/*ttl public/


    # - name: Create markdown documentation of keywords
    #   run: |
    #     keywords \
    #         --input=core.ttl \
    #         --keywords=build/keywords.md \
    #         --namespace-filter=ssbd \
    #         --redefine=allow \
    #        --set-prefix=emmo:https://w3id.org/emmo/hume#

    # - name: Create csv tables
    #   run: |
    #     python scripts/csv-documentation.py
    #     mv classes.csv properties.csv build/.

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public
        branch: gh-pages
        clean: false
        single-commit: true
