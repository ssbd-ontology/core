name: Deploy on GitHub Pages

# Only run this workflow on push to a release branch or master
#on: push
on:
  push:
    branches:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
      - master
      - main
      - better_docs

permissions:
  contents: write

jobs:
  deploy-on-ghpages:
    #concurrency: ci-${{ github.ref }}  # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Load ontokit configuration
      run: |
        if [ ! -f .ontokit_conf.yml ]; then
          echo "Missing .ontokit_conf.yml" >&2
          exit 1
        fi

        for key in ONTOLOGY_NAME ONTOLOGY_PREFIX ONTOLOGY_IRI GITHUB_REPOSITORY BUILD_DIR; do
          value=$(sed -n -E "s/^${key}:[[:space:]]*(.*)$/\\1/p" .ontokit_conf.yml | head -n 1)
          if [ -z "$value" ]; then
            echo "Missing required key '${key}' in .ontokit_conf.yml" >&2
            exit 1
          fi
          echo "${key}=${value}" >> "$GITHUB_ENV"
        done

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Install EMMOntoPy and tripper
      run: |
        pip install --upgrade pip
        pip install \
            "EMMOntoPy[ontodoc,ontokit] @ git+https://github.com/emmo-repo/EMMOntoPy.git@correct_links" \
            "tripper[datadoc] @ git+https://github.com/EMMC-ASBL/tripper.git@master"

    - name: List installed Python modules
      run: |
        pip list

    - name: Install ROBOT
      run: |
        mkdir bin
        wget -nv https://github.com/ontodev/robot/releases/download/v1.9.6/robot.jar
        mv robot.jar bin/.
        curl https://raw.githubusercontent.com/ontodev/robot/master/bin/robot > bin/robot
        chmod +x bin/robot
        ls -l bin/

    - name: Download Widoco
      run: |
        wget --quiet https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar

    - name: Copy readme and license files to gh-pages
      run: |
        mkdir -p "${BUILD_DIR}"
        cp README.md LICENSE "${BUILD_DIR}/."

    - name: Copy documentation to build
      run: |
        mkdir -p build
        cp -r docs/ build/.

    - name: Generate Ontokit documentation to public
      # We concatenate the core ontology with docterms.ttl to include terms
      # in the documentation that we don't want in the ontology.
      # Note that this change to core.ttl is only local.
      # Ontology files are copied to build
      # These are just used for generating documentation
      #
      # We also add .nojekyll file to public/ to avoid running jekyll on
      # GitHub Pages.
      #
      # Documentation is generated from build into public
      run: |
        cp *ttl build/ 
        cp catalog-v001.xml build/
        cat core.ttl docs/docterms.ttl > build/core.ttl
        ontokit docs --imported --recursive --ontology-file=core.ttl --docs-dir=docs .
        touch public/.nojekyll


    # Now ontologies to be added to public are generated directly
    - name: Create squashed ontology
      run: |
        ontoconvert \
            -saw \
            --base-iri="${ONTOLOGY_IRI}/" \
            --iri="${ONTOLOGY_IRI}" \
            --namespace="ssbd:${ONTOLOGY_IRI}/" \
            --namespace="ddoc:https://w3id.org/emmo/application/datadoc#" \
            --namespace="widoco:https://w3id.org/widoco/vocab#" \
            --namespace="dcatap:http://data.europa.eu/r5r/" \
            ${ONTOLOGY_NAME}.ttl \
            public/${ONTOLOGY_NAME}.ttl
            
    - name: Create inferred ontology
      run: |
        bin/robot reason \
          --reasoner HermiT \
          --remove-redundant-subclass-axioms true \
          --preserve-annotated-axioms true \
          --exclude-owl-thing true \
          --exclude-duplicate-axioms true \
          --input public/${ONTOLOGY_NAME}.ttl \
          --output public/${ONTOLOGY_NAME}-inferred.ttl
        ontoconvert --iri=${ONTOLOGY_IRI}/inferred public/${ONTOLOGY_NAME}-inferred.ttl public/${ONTOLOGY_NAME}-inferred.ttl

    # Generate Widoco documentation directly to public
    - name: Generate Widoco documentation for SSbD Core Ontology
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile core.ttl \
            -outFolder public/widoco \
            -getOntologyMetadata \
            -oops \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for reused terms
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile reused-terms.ttl \
            -outFolder public/widoco-reused-terms \
            -excludeIntroduction \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for ddoc terms
      run: |
        ontoconvert -awe \
            ddoc.ttl \
            build/ddoc-doc.ttl

        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile build/ddoc-doc.ttl \
            -outFolder public/widoco-ddoc \
            -excludeIntroduction \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for matter taxonomy
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile matter.ttl \
            -outFolder public/widoco-matter \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for models
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile models.ttl \
            -outFolder public/widoco-models \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate Widoco documentation for CHEMINF
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile cheminf.ttl \
            -outFolder public/widoco-cheminf \
            -getOntologyMetadata \
            -rewriteAll \
            -includeImportedOntologies \
            -licensius \
            -includeAnnotationProperties

    - name: Generate JSON-LD context
      run: |
        mkdir -p public/context
        keywords \
            --input=public/${ONTOLOGY_NAME}.ttl \
            --write-context=public/context/context.json \
            --redefine=allow \
            --set-prefix=emmo:https://w3id.org/emmo/hume# \
            --set-prefix=cheminf:http://semanticscience.org/resource/ \
            --set-prefix=ssbd:https://w3id.org/ssbd/ \
            --set-prefix=dm:https://w3id.org/emmo/domain/datamodel# 
            #--namespace-filter=ssbd

    - name: Generate keywords file
      run: |
        keywords \
            --input=public/${ONTOLOGY_NAME}.ttl \
            --write-kw-yaml=public/context/keywords.yaml \
            --redefine=allow \
            --set-prefix=emmo:https://w3id.org/emmo/hume# \
            --set-prefix=cheminf:http://semanticscience.org/resource/ \
            --set-prefix=ssbd:https://w3id.org/ssbd/ \
            --set-prefix=dm:https://w3id.org/emmo/domain/datamodel# 
            #--namespace-filter=ssbd

    - name: Copy ontologies, figures and context to public
      run: |
        ls public/
        cp -r docs/figs public/docs/
        echo "copied files"
        ls public/


    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public
        branch: gh-pages
        clean: false
        single-commit: true
