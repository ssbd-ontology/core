# Configurations used when running emmocheck from the ci_emmocheck workflow

skip:
  - test_description
  - test_class_label
  - test_object_property_label

enable:
  - test_number_of_rdfslabels
  - test_class_preflabel
  - test_property_preflabel

test_number_of_labels:
  exceptions:
    - ssbd.Software
    - ssbd.Information
    - ssbd.Model
 
test_number_of_rdfslabels:
  exceptions:
    - ssbd.Software
    - ssbd.Information
    - ssbd.Model

test_unique_labels:
  labels:
    - label
    - prefLabel
    
